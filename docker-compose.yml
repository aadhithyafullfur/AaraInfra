services:
  mongo:
    image: docker.io/library/mongo:7
    container_name: consultancy-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: consultancy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: consultancy-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5001
      CORS_ORIGIN: http://localhost:5173
      SOCKET_CORS_ORIGIN: http://localhost:5173
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001
        VITE_SOCKET_URL: http://localhost:5001
        VITE_ASSETS_BASE_URL: http://localhost:5001
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
    container_name: consultancy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
